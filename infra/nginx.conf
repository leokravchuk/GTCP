# =============================================================
#  GTCP — Gas Trading & Commercial Platform
#  nginx reverse proxy config (Ubuntu 22.04 + Let's Encrypt)
#
#  Deploy: /etc/nginx/sites-available/gtcp
#  Enable: ln -s /etc/nginx/sites-available/gtcp /etc/nginx/sites-enabled/
#          certbot --nginx -d gtcp.yourdomain.com
#          nginx -t && systemctl reload nginx
# =============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name gtcp.yourdomain.com;           # ← заменить домен
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gtcp.yourdomain.com;           # ← заменить домен

    # ── TLS (заполняется certbot автоматически) ─────────────
    ssl_certificate     /etc/letsencrypt/live/gtcp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gtcp.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # ── API proxy → Node.js backend (порт 3000) ─────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }

    # ── Swagger UI ──────────────────────────────────────────
    location /docs {
        proxy_pass         http://127.0.0.1:3000/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Frontend (GTCP_MVP.html) ────────────────────────────
    root /opt/gtcp/app/Soft;
    index GTCP_MVP.html;

    location / {
        try_files $uri $uri/ /GTCP_MVP.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Static assets cache ─────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Rate limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    location /api/v1/auth {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/gtcp_access.log;
    error_log  /var/log/nginx/gtcp_error.log warn;
}
