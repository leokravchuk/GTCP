version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# GTCP Backend — Docker Compose
# Services: api (Node.js), db (PostgreSQL 15), nginx (reverse proxy)
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:15-alpine
    container_name: gtcp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-gtcp}
      POSTGRES_USER:     ${DB_USER:-gtcp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gtcp_dev_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gtcp_user} -d ${DB_NAME:-gtcp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gtcp_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  3000
      API_PREFIX:            /api/v1
      DB_HOST:               db
      DB_PORT:               5432
      DB_NAME:               ${DB_NAME:-gtcp}
      DB_USER:               ${DB_USER:-gtcp_user}
      DB_PASSWORD:           ${DB_PASSWORD:-gtcp_dev_password}
      JWT_ACCESS_SECRET:     ${JWT_ACCESS_SECRET:-change_this_secret_in_production}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      JWT_ACCESS_EXPIRES:    ${JWT_ACCESS_EXPIRES:-24h}
      JWT_REFRESH_EXPIRES:   ${JWT_REFRESH_EXPIRES:-7d}
      CORS_ORIGIN:           ${CORS_ORIGIN:-http://localhost:8080}
      LOG_LEVEL:             ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: gtcp_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount the frontend HTML for static serving:
      - ../Soft/GTCP_MVP.html:/usr/share/nginx/html/index.html:ro

volumes:
  pg_data:
    driver: local
